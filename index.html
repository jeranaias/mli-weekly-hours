// ─── System Prompt ───────────────────────────────────────────────────────────
const SYSTEM_PROMPT = `You are an assistant that helps Military Language Instructors (MLIs) at DLIFLC categorize their weekly work hours.

## Form Structure

### Platform Teaching Contact Hours (TCH) — by team
Each row = one team you worked with. Aggregate hours per team across the week.
Columns: teamDsg, fullSect, splitSect, specAsst, suppleHours

### Non-Platform Schoolhouse Hours — weekly totals
Categories: classPrep, matlsDev, matlsReview, acadAdvise, discCounsel, mliInstMentor, classObserve, testProctor, ocEventAdmin

### Unit Hours — weekly totals
Categories: unitDuties, langMentor, proDevPme, postComm, absence

## Classification Rules
- Default group instruction -> fullSect unless stated otherwise
- Test critiques default 2 hours -> testProctor
- Zero hour (0700) -> specAsst
- PERSTAT/SIR/806 -> ocEventAdmin, 1 hour
- MLI Sync -> unitDuties
- SLS/EI sessions -> acadAdvise
- Single-team class codes: all group = fullSect (no splitSect)
- Homework non-completion counseling = discCounsel
- Failing a test = acadAdvise
- OPI prep with student = specAsst
- Teaching test strategies to group = suppleHours
- Informal instructor help = mliInstMentor
- Language Day = postComm

## Decision Tree
Teaching students?
  Full group core hours -> fullSect
  Subgroup split -> splitSect
  Individual curriculum -> specAsst
  Individual performance discussion -> acadAdvise
  Full group beyond core -> suppleHours
Academic/schoolhouse, not teaching?
  Lesson prep -> classPrep
  Creating materials -> matlsDev
  Reviewing materials -> matlsReview
  EI/SLS/academic standing -> acadAdvise
  Behavioral counseling -> discCounsel
  Mentoring instructor -> mliInstMentor
  Formal observation -> classObserve
  Proctoring/critique -> testProctor
  Admin (PERSTAT/SIR/806) -> ocEventAdmin
Military/unit-directed?
  Formations/sync/collateral -> unitDuties
  Language support non-students -> langMentor
  PME/SLTE/courses -> proDevPme
  Post/community events -> postComm

## When ambiguous, ask ONE clarifying question. When clear, classify directly.

## Response Format
Brief conversational summary, then JSON in \`\`\`json fences:
\`\`\`json
{
  "platformRows": [
    { "teamDsg": "A3", "fullSect": 6, "splitSect": 0, "specAsst": 1, "suppleHours": 0 }
  ],
  "nonPlatform": { "classPrep": 1, "ocEventAdmin": 1 },
  "unitHours": { "unitDuties": 3 },
  "clarification_needed": false,
  "confidence": "high"
}
\`\`\`

Rules:
- Only include non-zero values in nonPlatform and unitHours objects
- platformRows: one row per team, aggregate all hours for that team across the week
- Valid teamDsg values: ${ALL_TEAMS.join(', ')}
- Keep responses concise and military-professional
- If processing Excel/spreadsheet data, interpret all data and map to form fields
- confidence: "high" or "low" (low = needs user confirmation before applying)

If clarification needed:
\`\`\`json
{
  "platformRows": [],
  "nonPlatform": {},
  "unitHours": {},
  "clarification_needed": true,
  "question": "Were you teaching content or discussing performance?"
}
\`\`\``;

// ─── Utilities ───────────────────────────────────────────────────────────────
function computeSunday(dateStr) {
  if (!dateStr) return '';
  const d = new Date(dateStr + 'T00:00:00');
  d.setDate(d.getDate() - d.getDay());
  return d.toISOString().split('T')[0];
}

function formatDate(isoStr) {
  if (!isoStr) return '';
  return new Date(isoStr + 'T00:00:00').toLocaleDateString('en-US', { day: 'numeric', month: 'short', year: 'numeric' });
}

function emptyRow() { return { teamDsg: '', fullSect: 0, splitSect: 0, specAsst: 0, suppleHours: 0 }; }
function emptyNP() { const o = {}; NON_PLATFORM_CATS.forEach(c => o[c.id] = 0); return o; }
function emptyUH() { const o = {}; UNIT_CATS.forEach(c => o[c.id] = 0); return o; }
function rowTotal(r) { return (r.fullSect||0) + (r.splitSect||0) + (r.specAsst||0) + (r.suppleHours||0); }
function sumObj(o) { return Object.values(o).reduce((s, v) => s + (v||0), 0); }

function parseAIResponse(text) {
  const match = text.match(/```json\s*([\s\S]*?)```/);
  if (!match) return null;
  try { return JSON.parse(match[1]); } catch { return null; }
}

function parseExcelToText(data) {
  const wb = XLSX.read(data, { type: 'array' });
  let text = '';
  wb.SheetNames.forEach(name => {
    const csv = XLSX.utils.sheet_to_csv(wb.Sheets[name]);
    text += `Sheet: ${name}\n${csv}\n\n`;
  });
  return text.trim();
}

// ─── PDF Export ──────────────────────────────────────────────────────────────
async function exportPDF(formData) {
  const { PDFDocument } = await import('https://esm.sh/pdf-lib@1.17.1');
  const templateBytes = await fetch(new URL('template.pdf', window.location.href).href).then(r => r.arrayBuffer());
  const pdf = await PDFDocument.load(templateBytes);
  const form = pdf.getForm();

  const set = (name, val) => {
    try {
      const f = form.getTextField(name);
      if (val !== undefined && val !== null && val !== '') f.setText(String(val));
    } catch {}
  };

  set('Name', formData.name);
  set('Sunday Date', formData.sundayFormatted);

  // Platform TCH rows
  formData.platformRows.forEach((row, i) => {
    const n = i + 1;
    if (!row.teamDsg) return;
    set(n === 1 ? 'Team Dsg 1' : `Team Dsg${n}`, row.teamDsg);
    set(`Team Code${n}`, TEAM_CODE);
    set(`Full SectRow${n}`, row.fullSect || '');
    set(`Split SectRow${n}`, row.splitSect || '');
    set(`Spec AsstRow${n}`, row.specAsst || '');
    set(`Supple HoursRow${n}`, row.suppleHours || '');
    set(`Total TCHRow${n}`, rowTotal(row));
  });

  const pTotal = formData.platformRows.reduce((s, r) => s + rowTotal(r), 0);
  set('Total TCHRow11', pTotal);

  // Non-Platform
  const npMap = {
    classPrep: 'Class Prep', matlsDev: 'Matls Development', matlsReview: 'Matls Review',
    acadAdvise: 'Acad Advise', discCounsel: 'Disc Counsel', mliInstMentor: 'MLI Inst Mentor',
    classObserve: 'Class Observe', testProctor: 'Test Proctor', ocEventAdmin: 'OC Event Admin Spt',
  };
  Object.entries(npMap).forEach(([k, field]) => set(field, formData.nonPlatform[k] || ''));
  const npTotal = sumObj(formData.nonPlatform);
  set('NonPlatform Total', npTotal);

  // Unit Hours
  const uhMap = { unitDuties: 'Unit Duties', langMentor: 'Lang Mentor', proDevPme: 'Pro Dev PME', postComm: 'Post Events', absence: 'Absence' };
  Object.entries(uhMap).forEach(([k, field]) => set(field, formData.unitHours[k] || ''));
  const uhTotal = sumObj(formData.unitHours);
  set('Total Unit Hrs', uhTotal);

  // Summary
  set('Total Platform TCH', pTotal);
  set('Total NonPlatform Hou', npTotal);
  set('Total Unit Hours', uhTotal);
  set('Total Weekly Hours', pTotal + npTotal + uhTotal);

  const pdfBytes = await pdf.save();
  const blob = new Blob([pdfBytes], { type: 'application/pdf' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `MLI_Weekly_Hours_${formData.sundayISO || 'blank'}.pdf`;
  a.click();
  URL.revokeObjectURL(url);
}

// ─── Auth Context ────────────────────────────────────────────────────────────
const AuthContext = createContext(null);
const useAuth = () => useContext(AuthContext);

function AuthProvider({ children }) {
  const [user, setUser] = useState(null);
  const [loading, setLoading] = useState(true);

  useEffect(() => {
    if (!firebaseAuth) { setLoading(false); return; }
    return onAuthStateChanged(firebaseAuth, u => { setUser(u); setLoading(false); });
  }, []);

  const signIn = useCallback(async () => {
    if (!firebaseAuth) return;
    try { await signInWithPopup(firebaseAuth, new GoogleAuthProvider()); }
    catch (err) { console.error('Sign-in failed:', err); }
  }, []);

  const signOut = useCallback(async () => { if (firebaseAuth) await firebaseSignOut(firebaseAuth); }, []);

  return html`<${AuthContext.Provider} value=${{ user, loading, signIn, signOut }}>${children}</${AuthContext.Provider}>`;
}

function HourInput({ value, onChange, title }) {
  return html`<input type="number" min="0" max="24" step="0.5"
    value=${value || ''} onChange=${e => onChange(parseFloat(e.target.value) || 0)}
    title=${title || ''}
    className="w-full h-8 text-center text-sm border border-gray-300 rounded focus:outline-none focus:ring-2 focus:ring-mil-500 bg-white" />`;
}

function PlatformTCH({ rows, setRows, classCode, setClassCode }) {
  const addRow = () => { if (rows.length < 10) setRows([...rows, emptyRow()]); };
  const removeRow = (i) => { if (rows.length > 1) setRows(rows.filter((_, j) => j !== i)); };
  const updateRow = (i, field, val) => setRows(rows.map((r, j) => j === i ? { ...r, [field]: val } : r));
  const grandTotal = rows.reduce((s, r) => s + rowTotal(r), 0);

  const handleClassCode = (code) => {
    setClassCode(code);
    if (!code || !CLASS_CODES[code]) return;
    const teams = CLASS_CODES[code];
    const newRows = teams.map(t => ({ ...emptyRow(), teamDsg: t }));
    while (newRows.length < 1) newRows.push(emptyRow());
    setRows(newRows);
  };

  return html`
    <div className="border-l-4 border-green-600 bg-green-50 rounded-r mb-4">
      <div className="px-3 py-2 font-semibold text-sm border-b border-gray-200 flex flex-wrap items-center justify-between gap-2">
        <span>Platform Teaching Contact Hours (TCH)</span>
        <div className="flex items-center gap-2 no-print">
          <select value=${classCode} onChange=${e => handleClassCode(e.target.value)}
            className="text-xs border border-gray-300 rounded px-1 py-0.5 bg-white text-gray-700" title="Auto-fill teams from class code">
            <option value="">Class Code...</option>
            ${Object.keys(CLASS_CODES).sort().map(c => html`<option key=${c} value=${c}>${c} (${CLASS_CODES[c].join(', ')})</option>`)}
          </select>
          ${rows.length < 10 && html`
            <button onClick=${addRow} className="text-xs px-2 py-0.5 bg-green-600 text-white rounded hover:bg-green-700">+ Row</button>
          `}
        </div>
      </div>
      <div className="overflow-x-auto">
        <table className="w-full text-sm">
          <thead>
            <tr className="text-xs text-gray-500">
              <th className="text-left pl-3 py-1 w-24">Team Dsg</th>
              <th className="py-1 w-16 text-center">Full Sect</th>
              <th className="py-1 w-16 text-center">Split Sect</th>
              <th className="py-1 w-16 text-center">Spec Asst</th>
              <th className="py-1 w-16 text-center">Supple Hrs</th>
              <th className="py-1 w-14 text-center font-bold">Total</th>
              <th className="py-1 w-8 no-print"></th>
            </tr>
          </thead>
          <tbody>
            ${rows.map((row, i) => html`
              <tr key=${i} className="border-t border-gray-100">
                <td className="pl-3 py-1">
                  <select value=${row.teamDsg} onChange=${e => updateRow(i, 'teamDsg', e.target.value)}
                    className="w-full h-8 text-sm border border-gray-300 rounded bg-white">
                    <option value="">--</option>
                    ${ALL_TEAMS.map(t => html`<option key=${t} value=${t}>${t}</option>`)}
                  </select>
                </td>
                <td className="py-1 px-1"><${HourInput} value=${row.fullSect} onChange=${v => updateRow(i, 'fullSect', v)} /></td>
                <td className="py-1 px-1"><${HourInput} value=${row.splitSect} onChange=${v => updateRow(i, 'splitSect', v)} /></td>
                <td className="py-1 px-1"><${HourInput} value=${row.specAsst} onChange=${v => updateRow(i, 'specAsst', v)} /></td>
                <td className="py-1 px-1"><${HourInput} value=${row.suppleHours} onChange=${v => updateRow(i, 'suppleHours', v)} /></td>
                <td className="py-1 text-center font-semibold">${rowTotal(row) || ''}</td>
                <td className="py-1 text-center no-print">
                  ${rows.length > 1 && html`<button onClick=${() => removeRow(i)} className="text-red-400 hover:text-red-600 text-lg leading-none">x</button>`}
                </td>
              </tr>
            `)}
            <tr className="border-t-2 border-gray-300 bg-gray-50 font-semibold">
              <td className="pl-3 py-2 text-xs" colSpan="5">Platform TCH Total</td>
              <td className="py-2 text-center font-bold">${grandTotal || ''}</td>
              <td></td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>`;
}

function NonPlatformSection({ data, setData }) {
  const update = (k, v) => setData({ ...data, [k]: v });
  const total = sumObj(data);

  return html`
    <div className="border-l-4 border-blue-600 bg-blue-50 rounded-r mb-4">
      <div className="px-3 py-2 font-semibold text-sm border-b border-gray-200">Non-Platform Schoolhouse Hours</div>
      <div className="p-3 grid grid-cols-2 sm:grid-cols-5 gap-3">

          <div className="h-8 flex items-center justify-center font-bold text-sm bg-gray-100 rounded border border-gray-300">${total || '—'}</div>
        </div>

    </div>`;
}

function UnitHoursSection({ data, setData }) {
  const update = (k, v) => setData({ ...data, [k]: v });
  const total = sumObj(data);

  return html`
    <div className="border-l-4 border-amber-600 bg-amber-50 rounded-r mb-4">
      <div className="px-3 py-2 font-semibold text-sm border-b border-gray-200">Unit Hours</div>
      <div className="p-3 grid grid-cols-2 sm:grid-cols-3 md:grid-cols-6 gap-3">
        ${UNIT_CATS.map(cat => html`
          <div key=${cat.id}>
            <label className="block text-xs text-gray-600 mb-1 truncate" title=${CATEGORY_DEFS[cat.id]}>${cat.label}</label>
            <${HourInput} value=${data[cat.id]} onChange=${v => update(cat.id, v)} title=${CATEGORY_DEFS[cat.id]} />
          </div>
        `)}
        <div>
          <label className="block text-xs font-bold text-gray-700 mb-1">Total</label>
          <div className="h-8 flex items-center justify-center font-bold text-sm bg-gray-100 rounded border border-gray-300">${total || '—'}</div>
        </div>
      </div>
    </div>`;
}

function Summary({ platformRows, nonPlatform, unitHours }) {
  const p = platformRows.reduce((s, r) => s + rowTotal(r), 0);
  const np = sumObj(nonPlatform);
  const u = sumObj(unitHours);
  const t = p + np + u;

  return html`
    <div className="bg-gray-100 border rounded p-3 mb-4">
      <div className="grid grid-cols-4 gap-4 text-center text-sm">
        <div><div className="text-xs text-gray-500">Platform TCH</div><div className="font-bold text-lg text-green-700">${p || '—'}</div></div>
        <div><div className="text-xs text-gray-500">Non-Platform</div><div className="font-bold text-lg text-blue-700">${np || '—'}</div></div>
        <div><div className="text-xs text-gray-500">Unit Hours</div><div className="font-bold text-lg text-amber-700">${u || '—'}</div></div>
        <div><div className="text-xs text-gray-500">Weekly Total</div><div className="font-bold text-xl">${t || '—'}</div></div>
      </div>
    </div>`;
}

function ChatMessage({ msg }) {
  const isUser = msg.role === 'user';
  return html`
    <div className=${`flex ${isUser ? 'justify-end' : 'justify-start'} mb-3`}>
      <div className=${`max-w-[85%] rounded-lg px-3 py-2 text-sm ${isUser ? 'bg-mil-700 text-white' : 'bg-gray-100 text-gray-800'}`}>
        <div className="whitespace-pre-wrap">${msg.display || msg.content}</div>
        ${msg.pending && html`
          <div className="mt-2 flex gap-2">
            <button onClick=${msg.onAccept} className="px-2 py-1 bg-green-600 text-white rounded text-xs hover:bg-green-700">Accept</button>
            <button onClick=${msg.onReject} className="px-2 py-1 bg-red-600 text-white rounded text-xs hover:bg-red-700">Reject</button>
          </div>
        `}
      </div>
    </div>`;
}

function CategoryReference({ expanded, setExpanded }) {
  const groups = [
    { title: 'Platform TCH', items: [
      { l: 'Full Sect', d: CATEGORY_DEFS.fullSect }, { l: 'Split Sect', d: CATEGORY_DEFS.splitSect },
      { l: 'Spec Asst', d: CATEGORY_DEFS.specAsst }, { l: 'Supple Hrs', d: CATEGORY_DEFS.suppleHours },
    ]},
    { title: 'Non-Platform', items: NON_PLATFORM_CATS.map(c => ({ l: c.label, d: CATEGORY_DEFS[c.id] })) },
    { title: 'Unit Hours', items: UNIT_CATS.map(c => ({ l: c.label, d: CATEGORY_DEFS[c.id] })) },
  ];

  return html`
    <div className="border-t border-gray-200 no-print">
      <button onClick=${() => setExpanded(!expanded)} className="w-full text-left px-3 py-2 text-xs font-semibold text-gray-500 hover:bg-gray-50 flex justify-between items-center">
        Category Reference ${expanded ? String.fromCharCode(9650) : String.fromCharCode(9660)}
      </button>
      ${expanded && html`
        <div className="px-3 pb-3 max-h-60 overflow-y-auto">
          ${groups.map(g => html`
            <div key=${g.title} className="mb-2">
              <div className="text-xs font-bold text-gray-600 mb-1">${g.title}</div>
              ${g.items.map(c => html`
                <div key=${c.l} className="text-xs text-gray-500 mb-0.5"><span className="font-medium text-gray-700">${c.l}:</span> ${c.d}</div>
              `)}
            </div>
          `)}
        </div>
      `}
    </div>`;
}

function AuthPanel() {
  const { user, loading, signIn, signOut } = useAuth();
  if (!IS_CONFIGURED) return html`<div className="px-3 py-3 text-xs text-gray-500 text-center">Firebase not configured.</div>`;
  if (loading) return html`<div className="px-3 py-3 text-xs text-gray-400 text-center">Loading...</div>`;

  if (user) {
    return html`
      <div className="flex items-center gap-2 px-3 py-2 bg-gray-50 border-b">
        ${user.photoURL && html`<img src=${user.photoURL} alt="" className="w-6 h-6 rounded-full" referrerPolicy="no-referrer" />`}
        <div className="flex-1 min-w-0">
          <div className="text-xs font-medium text-gray-700 truncate">${user.displayName}</div>
        </div>
        <button onClick=${signOut} className="text-xs text-gray-400 hover:text-gray-600">Sign out</button>
      </div>`;
  }

  return html`
    <div className="px-3 py-3 bg-gray-50 border-b text-center">
      <div className="text-xs text-gray-500 mb-2">Sign in to use the AI assistant</div>
      <button onClick=${signIn}
        className="inline-flex items-center gap-2 px-4 py-2 border border-gray-300 rounded-md bg-white text-sm font-medium text-gray-700 hover:bg-gray-50 shadow-sm">
        <svg width="18" height="18" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59a14.5 14.5 0 0 1 0-9.18l-7.98-6.19a24.08 24.08 0 0 0 0 21.56l7.98-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg>
        Sign in with Google
      </button>
    </div>`;
}

function ChatSidebar({ platformRows, setPlatformRows, nonPlatform, setNonPlatform, unitHours, setUnitHours, resetKey }) {
  const { user } = useAuth();
  const [messages, setMessages] = useState([]);
  const [input, setInput] = useState('');
  const [loading, setLoading] = useState(false);
  const [refExpanded, setRefExpanded] = useState(false);
  const [dragging, setDragging] = useState(false);
  const chatRef = useRef(null);
  const chatEndRef = useRef(null);
  const fileRef = useRef(null);

  useEffect(() => {
    chatRef.current = (aiModel && user) ? aiModel.startChat() : null;
  }, [user, resetKey]);

  useEffect(() => { chatEndRef.current?.scrollIntoView({ behavior: 'smooth' }); }, [messages, loading]);

  const applyAIData = useCallback((data) => {
    if (data.platformRows?.length) {
      setPlatformRows(prev => {
        let next = [...prev];
        data.platformRows.forEach(newRow => {
          if (!newRow.teamDsg) return;
          const idx = next.findIndex(r => r.teamDsg === newRow.teamDsg);
          if (idx >= 0) {
            next[idx] = {
              ...next[idx],
              fullSect: (next[idx].fullSect||0) + (newRow.fullSect||0),
              splitSect: (next[idx].splitSect||0) + (newRow.splitSect||0),
              specAsst: (next[idx].specAsst||0) + (newRow.specAsst||0),
              suppleHours: (next[idx].suppleHours||0) + (newRow.suppleHours||0),
            };
          } else {
            const emptyIdx = next.findIndex(r => !r.teamDsg);
            if (emptyIdx >= 0) next[emptyIdx] = { teamDsg: newRow.teamDsg, fullSect: newRow.fullSect||0, splitSect: newRow.splitSect||0, specAsst: newRow.specAsst||0, suppleHours: newRow.suppleHours||0 };
            else if (next.length < 10) next.push({ teamDsg: newRow.teamDsg, fullSect: newRow.fullSect||0, splitSect: newRow.splitSect||0, specAsst: newRow.specAsst||0, suppleHours: newRow.suppleHours||0 });
          }
        });
        return next;
      });
    }
    if (data.nonPlatform) {
      setNonPlatform(prev => {
        const next = { ...prev };
        Object.entries(data.nonPlatform).forEach(([k, v]) => { if (k in next) next[k] = (next[k]||0) + (v||0); });
        return next;
      });
    }
    if (data.unitHours) {
      setUnitHours(prev => {
        const next = { ...prev };
        Object.entries(data.unitHours).forEach(([k, v]) => { if (k in next) next[k] = (next[k]||0) + (v||0); });
        return next;
      });
    }
  }, [setPlatformRows, setNonPlatform, setUnitHours]);

  const processResponse = (aiText, newMessages) => {
    const parsed = parseAIResponse(aiText);
    const display = aiText.replace(/```json[\s\S]*?```/g, '').trim();
    const hasData = parsed && !parsed.clarification_needed &&
      (parsed.platformRows?.length || Object.keys(parsed.nonPlatform||{}).length || Object.keys(parsed.unitHours||{}).length);

    if (hasData) {
      if (parsed.confidence === 'low') {
        const msgObj = {
          role: 'assistant', display, pending: true,
          onAccept: () => { applyAIData(parsed); setMessages(prev => prev.map(m => m === msgObj ? { ...m, pending: false, display: m.display + '\n\nApplied to form.' } : m)); },
          onReject: () => { setMessages(prev => prev.map(m => m === msgObj ? { ...m, pending: false, display: m.display + '\n\nRejected.' } : m)); },
        };
        setMessages([...newMessages, msgObj]);
      } else {
        applyAIData(parsed);
        setMessages([...newMessages, { role: 'assistant', display: display + '\n\nApplied to form.' }]);
      }
    } else {
      setMessages([...newMessages, { role: 'assistant', display }]);
    }
  };

  const sendMessage = async (text) => {
    const content = (text || input).trim();
    if (!content) return;
    const userMsg = { role: 'user', content };
    const newMessages = [...messages, userMsg];
    setMessages(newMessages);
    if (!text) setInput('');

    if (!chatRef.current) {
      setMessages([...newMessages, { role: 'assistant', display: user ? 'AI not available.' : 'Sign in with Google to use the AI.' }]);
      return;
    }

    setLoading(true);
    try {
      const result = await chatRef.current.sendMessage(content);
      processResponse(result.response.text(), newMessages);
    } catch (err) {
      const msg = err.message?.includes('429') ? 'Rate limit reached. Wait a moment.' : `Error: ${err.message}`;
      setMessages([...newMessages, { role: 'assistant', display: msg }]);
    } finally { setLoading(false); }
  };

  const handleFile = async (file) => {
    if (!file) return;
    const ext = file.name.split('.').pop().toLowerCase();
    if (!['xlsx', 'xls', 'csv'].includes(ext)) {
      setMessages(prev => [...prev, { role: 'assistant', display: 'Please upload an Excel (.xlsx, .xls) or CSV file.' }]);
      return;
    }
    try {
      const data = new Uint8Array(await file.arrayBuffer());
      const text = parseExcelToText(data);
      if (!text.trim()) {
        setMessages(prev => [...prev, { role: 'assistant', display: 'The file appears empty.' }]);
        return;
      }
      sendMessage(`Here is a spreadsheet of my hours. Please classify each entry:\n\n${text}`);
    } catch (err) {
      setMessages(prev => [...prev, { role: 'assistant', display: `Failed to read file: ${err.message}` }]);
    }
  };

  const handleDrop = (e) => { e.preventDefault(); setDragging(false); if (e.dataTransfer.files[0]) handleFile(e.dataTransfer.files[0]); };
  const handleKeyDown = (e) => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); } };

  return html`
    <div className="flex flex-col h-full no-print"
      onDrop=${handleDrop} onDragOver=${e => { e.preventDefault(); setDragging(true); }} onDragLeave=${() => setDragging(false)}>
      <div className="px-3 py-2 bg-mil-700 text-white text-sm font-semibold">AI Assistant</div>
      <${AuthPanel} />
      <div className=${`flex-1 overflow-y-auto p-3 space-y-1 relative ${dragging ? 'bg-blue-50' : ''}`}>
        ${dragging && html`
          <div className="absolute inset-0 flex items-center justify-center bg-blue-50/90 border-2 border-dashed border-blue-400 rounded z-10">
            <div className="text-blue-600 font-semibold text-sm">Drop Excel file here</div>
          </div>
        `}
        ${messages.length === 0 && html`
          <div className="text-center text-gray-400 text-sm mt-8">
            <p className="mb-2">Tell me about your week and I'll fill the form.</p>
            <p className="text-xs text-gray-300 mb-3">Example: "I taught A3 full section 15 hours, did 2 hours class prep, and 1 hour PERSTAT."</p>
            <p className="text-xs text-gray-300">Or drop/upload an Excel file with your hours.</p>
          </div>
        `}
        ${messages.map((m, i) => html`<${ChatMessage} key=${i} msg=${m} />`)}
        ${loading && html`<div className="flex justify-start mb-3"><div className="bg-gray-100 rounded-lg px-3 py-2 text-sm text-gray-400">Thinking...</div></div>`}
        <div ref=${chatEndRef} />
      </div>
      <div className="p-3 border-t">
        <div className="flex gap-2">
          <textarea value=${input} onChange=${e => setInput(e.target.value)} onKeyDown=${handleKeyDown}
            placeholder=${user ? "Describe your hours or drop Excel..." : "Sign in to use AI..."}
            rows=${2} className="flex-1 border border-gray-300 rounded px-2 py-1 text-sm resize-none focus:outline-none focus:ring-2 focus:ring-mil-500" />
          <div className="flex flex-col gap-1 self-end">
            <button onClick=${() => sendMessage()} disabled=${loading || !input.trim()}
              className="px-3 py-1 bg-mil-600 text-white rounded text-sm hover:bg-mil-700 disabled:opacity-50">Send</button>
            <button onClick=${() => fileRef.current?.click()}
              className="px-3 py-1 bg-gray-200 text-gray-600 rounded text-xs hover:bg-gray-300" title="Upload Excel file">File</button>
          </div>
        </div>
        <input ref=${fileRef} type="file" accept=".xlsx,.xls,.csv" className="hidden"
          onChange=${e => { handleFile(e.target.files[0]); e.target.value = ''; }} />
      </div>
      <${CategoryReference} expanded=${refExpanded} setExpanded=${setRefExpanded} />
    </div>`;
}

function MobileTabBar({ tab, setTab }) {
  return html`
    <div className="lg:hidden sticky top-0 z-50 flex border-b border-gray-300 bg-white no-print">
      <button onClick=${() => setTab('form')}
        className=${`flex-1 py-2.5 text-sm font-semibold text-center ${tab === 'form' ? 'text-mil-700 border-b-2 border-mil-700 bg-gray-50' : 'text-gray-400'}`}>
        Form
      </button>
      <button onClick=${() => setTab('chat')}
        className=${`flex-1 py-2.5 text-sm font-semibold text-center ${tab === 'chat' ? 'text-mil-700 border-b-2 border-mil-700 bg-gray-50' : 'text-gray-400'}`}>
        AI Chat
      </button>
    </div>`;
}

// ─── App ─────────────────────────────────────────────────────────────────────
function App() {
  const [name, setName] = useState('');
  const [weekDate, setWeekDate] = useState('');
  const [classCode, setClassCode] = useState('');
  const [platformRows, setPlatformRows] = useState([emptyRow()]);
  const [nonPlatform, setNonPlatform] = useState(emptyNP());
  const [unitHours, setUnitHours] = useState(emptyUH());
  const [chatKey, setChatKey] = useState(0);
  const [mobileTab, setMobileTab] = useState('form');

  const sunday = useMemo(() => computeSunday(weekDate), [weekDate]);

  const handleClear = () => {
    if (!confirm('Clear all form data?')) return;
    setName(''); setWeekDate(''); setClassCode('');
    setPlatformRows([emptyRow()]);
    setNonPlatform(emptyNP());
    setUnitHours(emptyUH());
    setChatKey(k => k + 1);
  };

  const handleExport = async () => {
    try {
      await exportPDF({
        name,
        sundayFormatted: formatDate(sunday),
        sundayISO: sunday,
        platformRows,
        nonPlatform,
        unitHours,
      });
    } catch (err) {
      alert('PDF export failed: ' + err.message);
      console.error('PDF export error:', err);
    }
  };

  return html`
    <${AuthProvider}>
      <${MobileTabBar} tab=${mobileTab} setTab=${setMobileTab} />
      <div className="flex flex-col lg:flex-row min-h-screen">
        <div className=${`flex-1 lg:max-w-[65%] p-0 ${mobileTab !== 'form' ? 'hidden lg:block' : ''}`}>
          <${Header} name=${name} setName=${setName} weekDate=${weekDate} setWeekDate=${setWeekDate}
            sunday=${sunday} onClear=${handleClear} onExport=${handleExport} />
          <div className="p-4">
            <${PlatformTCH} rows=${platformRows} setRows=${setPlatformRows} classCode=${classCode} setClassCode=${setClassCode} />
            <${NonPlatformSection} data=${nonPlatform} setData=${setNonPlatform} />
            <${UnitHoursSection} data=${unitHours} setData=${setUnitHours} />
            <${Summary} platformRows=${platformRows} nonPlatform=${nonPlatform} unitHours=${unitHours} />
          </div>
        </div>
        <div className=${`lg:w-[35%] border-l border-gray-200 bg-white flex flex-col h-[calc(100vh-41px)] lg:h-screen lg:sticky lg:top-0 no-print ${mobileTab !== 'chat' ? 'hidden lg:flex' : ''}`}>
          <${ChatSidebar} platformRows=${platformRows} setPlatformRows=${setPlatformRows}
            nonPlatform=${nonPlatform} setNonPlatform=${setNonPlatform}
            unitHours=${unitHours} setUnitHours=${setUnitHours} resetKey=${chatKey} />
        </div>
      </div>
    </${AuthProvider}>`;
}

ReactDOM.createRoot(document.getElementById('root')).render(html`<${App} />`);
</script>
</body>
</html>
